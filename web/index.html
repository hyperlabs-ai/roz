<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Anti-FOUC: aplica el tema (mismo criterio que components/theme.tsx) ANTES de que React
         monte, para no ver un flash de dark al cargar en light. Clave 'roz-theme'. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('roz-theme');
          var dark = t === 'dark' || ((!t || t === 'system') && matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/png" href="/roz.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0c0e14" />

    <!-- iOS: app en pantalla completa (standalone) para respetar notch + safe areas -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="roz" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>roz</title>
    <meta
      name="description"
      content="roz is an AI layer over GitHub with native tasks that observes your work, documents it, routes it, and notifies — automatically. Open source and self-hostable."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
